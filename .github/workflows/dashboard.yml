name: Actualizar Dashboards

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 07:00 Uruguay (UTC-3)
    - cron: '0 12 * * 1-5'   # 09:00 Uruguay
    - cron: '0 14 * * 1-5'   # 11:00 Uruguay
  workflow_dispatch:           # También permite ejecutar manualmente

jobs:
  generar-dashboards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install openpyxl google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Generar dashboards
        env:
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python generar_dashboards.py

      - name: Subir cambios a GitHub
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add index.html segura.html punta-del-este.html
          git diff --staged --quiet || git commit -m "Dashboard $(date +'%d/%m/%Y')"
          git pull --rebase origin main
          git push
